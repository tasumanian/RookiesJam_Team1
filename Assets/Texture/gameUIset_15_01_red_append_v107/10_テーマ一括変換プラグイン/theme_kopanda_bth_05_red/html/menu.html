<div id="menu_menu_wrapper">
	<div class="display_menu block_menu" align="center">

	<div class='menu_item menu_close' style='float:left; top: 580px; left: 20px;'>
	<a href="javascript:void(0)"><img src="data/others/plugin/theme_kopanda_bth_05_red/image/system/btn_back.png"></a>
	</div>

	<div style='clear:both'></div>

	<div>

		<div class="menu_item menu_save">
		<a href="javascript:void(0)"><img src="data/others/plugin/theme_kopanda_bth_05_red/image/system/menu_button_save.png"></a>
		</div>

		<div class="menu_item menu_load">
		<a href="javascript:void(0)"><img src="data/others/plugin/theme_kopanda_bth_05_red/image/system/menu_button_load.png"></a>
		</div>

		<div class="menu_item menu_window_close">
		<a href="javascript:void(0)"><img src="data/others/plugin/theme_kopanda_bth_05_red/image/system/menu_button_hide.png"></a>
		</div>

		<div class="menu_item menu_skip">
		<a href="javascript:void(0)"><img src="data/others/plugin/theme_kopanda_bth_05_red/image/system/menu_button_skip.png"></a>
		</div>

		<div class="menu_item menu_back_title">
		<a href="javascript:void(0)"><img src="data/others/plugin/theme_kopanda_bth_05_red/image/system/menu_button_title.png"></a>
		</div>

	</div>

</div>

	<!-- 背景画像 -->
	<img class="img_bg_base" src='data/others/plugin/theme_kopanda_bth_05_red/image/system/menu_bg.png' style='z-index:-1;left:0;top:0;width:100%;height:100%;position:absolute;'>

	<!-- ボタンホバー時に画像を変更する -->
	<script>
		// 1.ボタンのマウスダウン時に画像を変更
		// 2.タッチデバイス使用時、タップしたときに画像を変更

		$("#menu_menu_wrapper .menu_item img").each((i, elm) => {
			const j_elm = $(elm);
			const original_src = j_elm.attr("src");
			const hover_src = original_src.replace(".png", "_hov.png");
			const click_src = original_src.replace(".png", "_clk.png");

			let isMouseDown = false;

			// ホバー時
			j_elm.hover(
				() => {
					if (!isMouseDown) j_elm.attr("src", hover_src);
				},
				() => {
					if (!isMouseDown) j_elm.attr("src", original_src);
				}
			);

			// マウス押下時
			j_elm.on("mousedown", () => {
				isMouseDown = true;
				j_elm.attr("src", click_src);
			});

			// マウス離したとき
			$(document).on("mouseup", () => {
				if (isMouseDown) {
					isMouseDown = false;
					if (j_elm.is(":hover")) {
						j_elm.attr("src", hover_src);
					} else {
						j_elm.attr("src", original_src);
					}
				}
			});

			// タッチデバイス対応
			j_elm.on("touchstart", () => {
				j_elm.attr("src", click_src);
			});
			j_elm.on("touchend touchcancel", () => {
				j_elm.attr("src", original_src);
			});
		});

	</script>

</div>
